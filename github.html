<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nyxian</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Montserrat y Archivo Black para botones, títulos y labels -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Montserrat:wght@700&display=swap');
        :root {
            --bg-light: #fff;
            --bg-dark: #111;
            --text-light: #111;
            --text-dark: #fff;
            --divider-light: #e0e0e0;
            --divider-dark: #444;
        }
        body {
            margin: 0;
            min-height: 100vh;
            background: var(--bg-light);
            color: var(--text-light);
            display: flex;
            flex-direction: column;
            transition: background 0.3s, color 0.3s;
            font-family: 'Montserrat', Arial, sans-serif;
            font-weight: 700;
        }
        body.dark {
            background: var(--bg-dark);
            color: var(--text-dark);
        }
        .toggle-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            padding: 8px 18px;
            font-size: 1rem;
            border: none;
            border-radius: 6px;
            background: #e0e0e0;
            color: #222;
            cursor: pointer;
            transition: background 0.3s;
            z-index: 10;
            font-family: 'Montserrat', Arial, sans-serif;
            font-weight: 400;
            letter-spacing: 1px;
        }
        body.dark .toggle-btn {
            background: #222;
            color: #fff;
        }
        .menu-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            font-size: 2rem;
            cursor: pointer;
            z-index: 11;
            color: inherit;
            font-family: 'Montserrat', Arial, sans-serif;
            font-weight: 400;
        }
        .menu-dropdown {
            display: none;
            position: absolute;
            top: 55px;
            right: 20px;
            background: #fff;
            color: #111;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            min-width: 160px;
            overflow: hidden;
            z-index: 12;
            font-family: 'Archivo Black', Arial, sans-serif;
            font-weight: 400;
            animation: fadeIn 0.2s;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px);}
            to { opacity: 1; transform: translateY(0);}
        }
        .menu-dropdown.show {
            display: block;
        }
        .menu-dropdown a {
            display: block;
            padding: 14px 24px;
            text-decoration: none;
            color: inherit;
            font-size: 1rem;
            transition: background 0.2s;
            font-family: 'Montserrat', Arial, sans-serif;
            font-weight: 400;
        }
        .menu-dropdown a:hover {
            background: #f0f0f0;
        }
        body.dark .menu-dropdown {
            background: #222;
            color: #fff;
        }
        body.dark .menu-dropdown a:hover {
            background: #333;
        }
        .center-title {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            margin-top: 40px;
            margin-bottom: 18px;
            text-align: center;
        }
        .center-title img {
            max-width: 60px;
            width: 60px;
            height: 60px;
            margin-bottom: 10px;
            filter: brightness(0) invert(0); /* Logo PNG: negro en claro */
            transition: filter 0.3s;
        }
        body.dark .center-title img {
            filter: brightness(0) invert(1); /* Logo PNG: blanco en oscuro */
        }
        .center-title h1 {
            margin: 0;
            font-size: 2.2rem;
            text-align: center;
            letter-spacing: 2px;
            font-family: 'Archivo Black', Arial, sans-serif;
            font-weight: 400;
        }
        .grey-divider {
            width: 95vw;
            max-width: 680px;
            border: none;
            height: 3px;
            background: var(--divider-light);
            margin: 32px auto 30px auto;
            border-radius: 3px;
        }
        body.dark .grey-divider {
            background: var(--divider-dark);
        }
        .section-title {
            text-align: center;
            font-size: 1.5rem;
            letter-spacing: 1px;
            margin-bottom: 32px;
            font-weight: 700;
            font-family: 'Archivo Black', Arial, sans-serif;
        }
        .collab-row {
            display: flex;
            justify-content: center;
            align-items: stretch;
            gap: 36px;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }
        .collab-col {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 120px;
            max-width: 140px;
            flex: 1 1 120px;
        }
        .collab-col img {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 16px;
            margin-bottom: 10px;
            border: 2.5px solid #bbb;
            background: #eee;
            transition: border 0.3s, background 0.3s;
        }
        body.dark .collab-col img {
            border: 2.5px solid #444;
            background: #222;
        }
        .collab-label {
            font-size: 1.02rem;
            text-align: center;
            font-family: 'Archivo Black', Arial, sans-serif;
            font-weight: 400;
        }
        .collab-row-single {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 4px;
        }
        /* GitHub sección final */
        .github-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 36px;
            margin-bottom: 36px;
        }
        .github-icon-wrapper {
            width: 56px;
            height: 56px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 8px;
        }
        .github-icon-wrapper img {
            width: 56px;
            height: 56px;
            object-fit: contain;
            filter: brightness(0) invert(0); /* Logo PNG: negro en claro */
            transition: filter 0.3s;
            cursor: pointer;
        }
        body.dark .github-icon-wrapper img {
            filter: brightness(0) invert(1); /* Logo PNG: blanco en oscuro */
        }
        .github-label {
            font-size: 1.15rem;
            font-weight: 700;
            margin-bottom: 18px;
            letter-spacing: 1px;
            font-family: 'Archivo Black', Arial, sans-serif;
        }
        .github-logo-link img {
            width: 80px;
            height: 80px;
            object-fit: contain;
            filter: brightness(0) invert(0); /* Logo PNG: negro en claro */
            transition: filter 0.3s;
            cursor: pointer;
            margin-top: 12px;
        }
        body.dark .github-logo-link img {
            filter: brightness(0) invert(1); /* Logo PNG: blanco en oscuro */
        }
        /* ==== EFECTO DE ICONO EN CLICK ==== */
        .click-effect {
            position: fixed;
            pointer-events: none;
            z-index: 10000;
            width: 44px;
            height: 44px;
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
            animation: pop-fade 0.5s forwards;
            will-change: transform, opacity, filter;
            filter: drop-shadow(0 2px 10px #0002);
            transition: filter 0.3s;
        }
        body.dark .click-effect {
            filter: drop-shadow(0 2px 10px #fff3);
        }
        @keyframes pop-fade {
            0% {
                transform: translate(-50%, -50%) scale(0.6);
                opacity: 0.85;
            }
            50% {
                transform: translate(-50%, -50%) scale(1.18) rotate(-10deg);
                opacity: 1;
            }
            100% {
                transform: translate(-50%, -50%) scale(0.6) rotate(10deg);
                opacity: 0;
            }
        }
        /* Responsive */
        @media (max-width: 900px) {
            .collab-row {
                gap: 18px;
            }
        }
        @media (max-width: 600px) {
            .center-title img {
                width: 38px;
                height: 38px;
            }
            .collab-row {
                gap: 10px;
            }
            .collab-col img {
                width: 64px;
                height: 64px;
            }
            .collab-col {
                min-width: 80px;
                max-width: 90px;
            }
            .github-icon-wrapper, .github-icon-wrapper img {
                width: 36px;
                height: 36px;
            }
            .github-logo-link img {
                width: 56px;
                height: 56px;
            }
            .grey-divider {
                width: 95vw;
                max-width: 160px;
            }
            .click-effect {
                width: 32px;
                height: 32px;
            }
        }
    </style>
</head>
<body>
    <button class="toggle-btn" id="toggleTheme">Claro 🌞</button>
    <button class="menu-btn" id="menuBtn" aria-label="Menú">&#8942;</button>
    <div class="menu-dropdown" id="menuDropdown">
        <a href="index.html">Inicio</a>
        <a href="github.html" target="_blank">GitHub</a>
        <a href="contact.html">Contacto</a>
    </div>
    <div class="center-title">
        <img src="./images/logo.png" alt="Logo">
        <h1>Nyxian.xyz</h1>
    </div>
    <hr class="grey-divider">
    <div class="section-title">Colaboraciones</div>
    <div class="collab-row">
        <div class="collab-col">
            <img src="./images/imagen-1.jpg" alt="Akeno Himejima">
            <span class="collab-label">Akeno Himejima</span>
        </div>
        <div class="collab-col">
            <img src="./images/imagen-2.jpg" alt="Marin Kitagawa">
            <span class="collab-label">Marin Kitagawa</span>
        </div>
        <div class="collab-col">
            <img src="./images/imagen-3.jpg" alt="Tsukasa Yuzaki">
            <span class="collab-label">Tsukasa Yuzaki</span>
        </div>
    </div>
    <div class="collab-row-single">
        <div class="collab-col">
            <img src="./images/imagen-4.jpg" alt="Nino Nakano">
            <span class="collab-label">Nino Nakano</span>
        </div>
    </div>
    <hr class="grey-divider">
    <div class="github-section">
        <div class="github-icon-wrapper">
            <img src="./images/logo.png" alt="GitHub Icon">
        </div>
        <div class="github-label">GITHUB</div>
        <a class="github-logo-link" href="https://github.com/ianalejandrook14x" target="_blank" title="Mi perfil de GitHub">
            <img src="./images/info-logo.png" alt="GitHub Logo">
        </a>
    </div>
    <script>
        const btn = document.getElementById('toggleTheme');
        const body = document.body;
        let darkMode = localStorage.getItem('darkMode') === 'true';

        function applyTheme() {
            if (darkMode) {
                body.classList.add('dark');
                btn.textContent = 'Oscuro 🌙';
            } else {
                body.classList.remove('dark');
                btn.textContent = 'Claro 🌞';
            }
        }

        applyTheme();

        btn.addEventListener('click', () => {
            darkMode = !darkMode;
            localStorage.setItem('darkMode', darkMode);
            applyTheme();
        });

        // Menú desplegable hamburguesa
        const menuBtn = document.getElementById('menuBtn');
        const menuDropdown = document.getElementById('menuDropdown');
        menuBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            menuDropdown.classList.toggle('show');
        });
        document.addEventListener('click', () => {
            menuDropdown.classList.remove('show');
        });
        menuDropdown.addEventListener('click', (e) => {
            e.stopPropagation();
        });

        // ===== EFECTO DE ICONO EN CLICK =====
        document.addEventListener('click', function (e) {
            // Evita que el efecto se muestre sobre el menú y el botón de tema
            if (e.target.closest('.menu-dropdown') || e.target.closest('.menu-btn')) return;
            if (e.target.closest('.toggle-btn')) return;

            const effect = document.createElement('img');
            effect.src = './images/icon-web.png';
            effect.className = 'click-effect';

            effect.style.left = e.clientX + 'px';
            effect.style.top = e.clientY + 'px';

            // Ajustar el filtro si está en modo oscuro
            if (body.classList.contains('dark')) {
                effect.style.filter += ' invert(1)';
            } else {
                effect.style.filter = effect.style.filter.replace('invert(1)', '');
            }

            document.body.appendChild(effect);

            setTimeout(() => {
                effect.remove();
            }, 500);
        });
    </script>
</body>
</html>
