<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nyxian</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Montserrat:wght@700&display=swap');
        :root {
            --bg-light: #fff;
            --bg-dark: #111;
            --text-light: #111;
            --text-dark: #fff;
            --divider-light: #e0e0e0;
            --divider-dark: #444;
        }
        body {
            margin: 0;
            min-height: 100vh;
            background: var(--bg-light);
            color: var(--text-light);
            display: flex;
            flex-direction: column;
            transition: background 0.3s, color 0.3s;
            font-family: 'Montserrat', Arial, sans-serif;
            font-weight: 700;
        }
        body.dark {
            background: var(--bg-dark);
            color: var(--text-dark);
        }
        .toggle-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            padding: 8px 18px;
            font-size: 1rem;
            border: none;
            border-radius: 6px;
            background: #e0e0e0;
            color: #222;
            cursor: pointer;
            transition: background 0.3s;
            z-index: 10;
            font-family: 'Montserrat', Arial, sans-serif;
            font-weight: 400;
            letter-spacing: 1px;
        }
        body.dark .toggle-btn {
            background: #222;
            color: #fff;
        }
        .center-title {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            margin-top: 40px;
            margin-bottom: 16px;
            text-align: center;
        }
        .center-title img {
            max-width: 40px;
            height: auto;
            margin-bottom: 12px;
            filter: invert(0);
            transition: filter 0.3s;
        }
        body.dark .center-title img {
            filter: invert(1);
        }
        .center-title h1 {
            margin: 0;
            font-size: 2.2rem;
            text-align: center;
            letter-spacing: 2px;
            font-family: 'Archivo Black', Arial, sans-serif;
            font-weight: 400;
        }
        .menu-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            font-size: 2rem;
            cursor: pointer;
            z-index: 11;
            color: inherit;
            font-family: 'Archivo Black', Arial, sans-serif;
            font-weight: 400;
        }
        .menu-dropdown {
            display: none;
            position: absolute;
            top: 55px;
            right: 20px;
            background: #fff;
            color: #111;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            min-width: 160px;
            overflow: hidden;
            z-index: 12;
            font-family: 'Montserrat', Arial, sans-serif;
            font-weight: 400;
            animation: fadeIn 0.2s;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px);}
            to { opacity: 1; transform: translateY(0);}
        }
        .menu-dropdown.show {
            display: block;
        }
        .menu-dropdown a {
            display: block;
            padding: 14px 24px;
            text-decoration: none;
            color: inherit;
            font-size: 1rem;
            transition: background 0.2s;
            font-family: 'Montserrat', Arial, sans-serif;
            font-weight: 400;
        }
        .menu-dropdown a:hover {
            background: #f0f0f0;
        }
        body.dark .menu-dropdown {
            background: #222;
            color: #fff;
        }
        body.dark .menu-dropdown a:hover {
            background: #333;
        }
        .contact-section {
            margin-top: 48px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 36px;
        }
        .contact-block {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }
        .contact-block .icon-wrapper {
            width: 80px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .contact-block img {
            width: 80px;
            height: 80px;
            object-fit: contain;
            margin: 0;
            cursor: pointer;
            transition: transform 0.2s, filter 0.3s;
            filter: brightness(0) invert(0);
        }
        body.dark .contact-block img {
            filter: brightness(0) invert(1);
        }
        .contact-label {
            font-size: 1.15rem;
            margin-bottom: 2px;
            color: inherit;
            font-family: 'Archivo Black', Arial, sans-serif;
            font-weight: 400;
        }
        .grey-divider {
            width: 90vw;
            max-width: 420px;
            border: none;
            height: 2.5px;
            background: var(--divider-light);
            margin: 28px auto;
            border-radius: 2px;
        }
        body.dark .grey-divider {
            background: var(--divider-dark);
        }
        .click-effect {
            position: fixed;
            pointer-events: none;
            z-index: 10000;
            width: 44px;
            height: 44px;
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
            animation: pop-fade 0.5s forwards;
            will-change: transform, opacity, filter;
            filter: drop-shadow(0 2px 10px #0002);
            transition: filter 0.3s;
        }
        body.dark .click-effect {
            filter: drop-shadow(0 2px 10px #fff3);
        }
        @keyframes pop-fade {
            0% {
                transform: translate(-50%, -50%) scale(0.6);
                opacity: 0.85;
            }
            50% {
                transform: translate(-50%, -50%) scale(1.18) rotate(-10deg);
                opacity: 1;
            }
            100% {
                transform: translate(-50%, -50%) scale(0.6) rotate(10deg);
                opacity: 0;
            }
        }
        /* Responsive */
        @media (max-width: 600px) {
            .contact-block .icon-wrapper {
                width: 56px;
                height: 56px;
            }
            .contact-block img {
                width: 56px;
                height: 56px;
            }
            .grey-divider {
                width: 90vw;
                max-width: 220px;
            }
            .click-effect {
                width: 32px;
                height: 32px;
            }
        }
    </style>
</head>
<body>
    <button class="toggle-btn" id="toggleTheme">Claro 🌞</button>
    <button class="menu-btn" id="menuBtn" aria-label="Menú">&#8942;</button>
    <div class="menu-dropdown" id="menuDropdown">
        <a href="index.html">Inicio</a>
        <a href="github.html">GitHub</a>
        <a href="contact.html">Contacto</a>
        <a href="template.html">Template</a>
    </div>
    <div class="center-title">
        <img id="logoImg" src="./images/logo.png" alt="Logo">
        <h1>Nyxian.xyz</h1>
    </div>
    <div class="contact-section" id="contacto">
        <div class="contact-block">
            <a href="https://wa.me/+5493876639332" target="_blank" title="WhatsApp">
                <span class="icon-wrapper">
                    <img src="./images/whatsapp-log.png" alt="WhatsApp">
                </span>
            </a>
            <span class="contact-label">WhatsApp</span>
        </div>
        <hr class="grey-divider">
        <div class="contact-block">
            <a href="mailto:ianalejandrook1@gmail.com" title="Correo Electrónico">
                <span class="icon-wrapper">
                    <img src="./images/correo-log.png" alt="Correo Electrónico">
                </span>
            </a>
            <span class="contact-label">Correo Electrónico</span>
        </div>
    </div>
    <script>
        const btn = document.getElementById('toggleTheme');
        const body = document.body;
        let darkMode = localStorage.getItem('darkMode') === 'true';

        function applyTheme() {
            const logoImg = document.getElementById('logoImg');
            if (darkMode) {
                body.classList.add('dark');
                btn.textContent = 'Oscuro 🌙';
                if (logoImg) {
                    logoImg.src = './images/logo.png';
                    logoImg.style.filter = 'invert(0)';
                }
            } else {
                body.classList.remove('dark');
                btn.textContent = 'Claro 🌞';
                if (logoImg) {
                    logoImg.src = './images/logo.png';
                    logoImg.style.filter = 'invert(1)';
                }
            }
        }

        applyTheme();

        btn.addEventListener('click', () => {
            darkMode = !darkMode;
            localStorage.setItem('darkMode', darkMode);
            applyTheme();
        });

        const menuBtn = document.getElementById('menuBtn');
        const menuDropdown = document.getElementById('menuDropdown');
        menuBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            menuDropdown.classList.toggle('show');
        });
        document.addEventListener('click', () => {
            menuDropdown.classList.remove('show');
        });
        menuDropdown.addEventListener('click', (e) => {
            e.stopPropagation();
        });

        document.addEventListener('click', function (e) {
            if (e.target.closest('.menu-dropdown') || e.target.closest('.menu-btn')) return;
            if (e.target.closest('.toggle-btn')) return;

            const effect = document.createElement('img');
            effect.src = './images/icon-web.png';
            effect.className = 'click-effect';

            effect.style.left = e.clientX + 'px';
            effect.style.top = e.clientY + 'px';

            if (body.classList.contains('dark')) {
                effect.style.filter += ' invert(1)';
            } else {
                effect.style.filter = effect.style.filter.replace('invert(1)', '');
            }

            document.body.appendChild(effect);

            setTimeout(() => {
                effect.remove();
            }, 500);
        });
    </script>
</body>
</html>
