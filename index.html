<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nyxian</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap');
        :root {
            --bg-light: #fff;
            --bg-dark: #111;
            --text-light: #111;
            --text-dark: #fff;
        }
        body {
            margin: 0;
            min-height: 100vh;
            background: var(--bg-light);
            color: var(--text-light);
            display: flex;
            flex-direction: column;
            transition: background 0.3s, color 0.3s;
            font-family: 'Montserrat', Arial, sans-serif;
            font-weight: 700;
        }
        body.dark {
            background: var(--bg-dark);
            color: var(--text-dark);
        }
        .toggle-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            padding: 10px 18px;
            font-size: 1rem;
            border: none;
            border-radius: 6px;
            background: #e0e0e0;
            color: #222;
            cursor: pointer;
            transition: background 0.3s;
            z-index: 10;
            font-family: 'Montserrat', Arial, sans-serif;
            font-weight: 700;
        }
        body.dark .toggle-btn {
            background: #222;
            color: #fff;
        }
        /* Centrado superior para el logo y título */
        .center-title {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            margin-top: 40px;
            margin-bottom: 16px;
            text-align: center;
        }
        .center-title img {
            max-width: 40px;
            height: auto;
            margin-bottom: 12px;
            filter: invert(0);
            transition: filter 0.3s;
        }
        .center-title h1 {
            margin: 0;
            font-size: 2.2rem;
            text-align: center;
            letter-spacing: 2px;
        }
        /* Botón hamburguesa */
        .menu-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            font-size: 2rem;
            cursor: pointer;
            z-index: 11;
            color: inherit;
            font-family: 'Montserrat', Arial, sans-serif;
            font-weight: 700;
        }
        /* Menú desplegable */
        .menu-dropdown {
            display: none;
            position: absolute;
            top: 55px;
            right: 20px;
            background: #fff;
            color: #111;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            min-width: 160px;
            overflow: hidden;
            z-index: 12;
            font-family: 'Montserrat', Arial, sans-serif;
            font-weight: 700;
            animation: fadeIn 0.2s;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px);}
            to { opacity: 1; transform: translateY(0);}
        }
        .menu-dropdown.show {
            display: block;
        }
        .menu-dropdown a {
            display: block;
            padding: 14px 24px;
            text-decoration: none;
            color: inherit;
            font-size: 1rem;
            transition: background 0.2s;
            font-family: 'Montserrat', Arial, sans-serif;
            font-weight: 700;
        }
        .menu-dropdown a:hover {
            background: #f0f0f0;
        }
        body.dark .menu-dropdown {
            background: #222;
            color: #fff;
        }
        body.dark .menu-dropdown a:hover {
            background: #333;
        }
    </style>
</head>
<body>
    <button class="toggle-btn" id="toggleTheme">Claro 🌞</button>
    <button class="menu-btn" id="menuBtn" aria-label="Menú">&#8942;</button>
    <div class="menu-dropdown" id="menuDropdown">
        <a href="index.html">Inicio</a>
        <a href="github.html" target="_blank">GitHub</a>
        <a href="contact.html">Contacto</a>
    </div>
    <!-- CENTRADO ARRIBA -->
    <div class="center-title">
        <img id="logoImg" src="./images/logo.png" alt="Logo">
        <h1>Nyxian.xyz</h1>
    </div>
    <div style="margin-top: 48px; text-align: center;">
        <p style="font-size: 1.1rem;">
            Hola Bienvenido a Nyxian.xyz, un sitio web en progreso
            <br>
            <br>
            <br>
            Powered by ianaleajandrook14x
        <p></p>
    </div>
    <script>
        const btn = document.getElementById('toggleTheme');
        const body = document.body;

        // Leer el modo guardado en localStorage
        let darkMode = localStorage.getItem('darkMode') === 'true';

        function applyTheme() {
            const logoImg = document.getElementById('logoImg');
            if (darkMode) {
                body.classList.add('dark');
                btn.textContent = 'Oscuro 🌙';
                if (logoImg) {
                    logoImg.src = './images/logo.png'; // blanco para modo oscuro
                    logoImg.style.filter = 'invert(0)';
                }
            } else {
                body.classList.remove('dark');
                btn.textContent = 'Claro 🌞';
                if (logoImg) {
                    logoImg.src = './images/logo.png'; // usa el mismo logo pero invertido
                    logoImg.style.filter = 'invert(1)';
                }
            }
        }

        applyTheme();

        btn.addEventListener('click', () => {
            darkMode = !darkMode;
            localStorage.setItem('darkMode', darkMode);
            applyTheme();
        });

        const menuBtn = document.getElementById('menuBtn');
        const menuDropdown = document.getElementById('menuDropdown');
        menuBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            menuDropdown.classList.toggle('show');
        });
        document.addEventListener('click', () => {
            menuDropdown.classList.remove('show');
        });
        menuDropdown.addEventListener('click', (e) => {
            e.stopPropagation();
        });
    </script>
</body>
</html>
