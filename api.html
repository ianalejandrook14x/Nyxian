<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nyxian | APIs</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap');
        :root {
            --bg-light: #fff;
            --bg-dark: #111;
            --text-light: #111;
            --text-dark: #fff;
            --divider-light: #e0e0e0;
            --divider-dark: #444;
            --api-btn-light: #111;
            --api-btn-dark: #fff;
            --api-btn-text-light: #fff;
            --api-btn-text-dark: #111;
        }
        body {
            margin: 0;
            min-height: 100vh;
            background: var(--bg-light);
            color: var(--text-light);
            display: flex;
            flex-direction: column;
            transition: background 0.3s, color 0.3s;
            font-family: 'Montserrat', Arial, sans-serif;
            font-weight: 700;
        }
        body.dark {
            background: var(--bg-dark);
            color: var(--text-dark);
        }
        .toggle-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            padding: 10px 18px;
            font-size: 1rem;
            border: none;
            border-radius: 6px;
            background: #e0e0e0;
            color: #222;
            cursor: pointer;
            transition: background 0.3s;
            z-index: 10;
            font-family: 'Montserrat', Arial, sans-serif;
            font-weight: 700;
        }
        body.dark .toggle-btn {
            background: #222;
            color: #fff;
        }
        .menu-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            font-size: 2rem;
            cursor: pointer;
            z-index: 11;
            color: inherit;
            font-family: 'Montserrat', Arial, sans-serif;
            font-weight: 700;
        }
        .menu-dropdown {
            display: none;
            position: absolute;
            top: 55px;
            right: 20px;
            background: #fff;
            color: #111;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            min-width: 160px;
            overflow: hidden;
            z-index: 12;
            font-family: 'Montserrat', Arial, sans-serif;
            font-weight: 700;
            animation: fadeIn 0.2s;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px);}
            to { opacity: 1; transform: translateY(0);}
        }
        .menu-dropdown.show {
            display: block;
        }
        .menu-dropdown a {
            display: block;
            padding: 14px 24px;
            text-decoration: none;
            color: inherit;
            font-size: 1rem;
            transition: background 0.2s;
            font-family: 'Montserrat', Arial, sans-serif;
            font-weight: 700;
        }
        .menu-dropdown a:hover {
            background: #f0f0f0;
        }
        body.dark .menu-dropdown {
            background: #222;
            color: #fff;
        }
        body.dark .menu-dropdown a:hover {
            background: #333;
        }
        .center-title {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            margin-top: 48px;
            margin-bottom: 18px;
            text-align: center;
        }
        .center-title img {
            max-width: 60px;
            width: 60px;
            height: 60px;
            margin-bottom: 10px;
            filter: brightness(0) invert(0);
            transition: filter 0.3s;
        }
        body.dark .center-title img {
            filter: brightness(0) invert(1);
        }
        .center-title h1 {
            margin: 0;
            font-size: 2.2rem;
            text-align: center;
            letter-spacing: 2px;
        }
        .api-section {
            width: 100%;
            max-width: 420px;
            margin: 0 auto;
            text-align: center;
            margin-top: 36px;
        }
        .api-title {
            font-size: 1.35rem;
            font-weight: 700;
            margin-bottom: 32px;
            letter-spacing: 1px;
        }
        .apis-list {
            display: flex;
            flex-direction: column;
            gap: 26px;
            align-items: center;
            justify-content: center;
        }
        .api-item {
            display: flex;
            align-items: center;
            gap: 16px;
            justify-content: center;
            width: 100%;
            max-width: 340px;
        }
        .api-sheet-img {
            width: 36px;
            height: 36px;
            object-fit: contain;
            margin-right: 4px;
            user-select: none;
            /* Por defecto: negro, en oscuro: blanco */
            filter: brightness(0) invert(0);
            transition: filter 0.3s;
        }
        body.dark .api-sheet-img {
            filter: brightness(0) invert(1);
        }
        .api-name {
            font-size: 1.15rem;
            font-weight: 600;
            flex: 1;
            text-align: left;
            letter-spacing: 1px;
        }
        .api-btn {
            padding: 8px 24px;
            font-size: 1.05rem;
            font-weight: 700;
            border: none;
            border-radius: 7px;
            background: var(--api-btn-light);
            color: var(--api-btn-text-light);
            cursor: pointer;
            transition: background 0.3s, color 0.3s;
            box-shadow: 0 2px 8px #0001;
            outline: none;
        }
        .api-btn:active {
            transform: scale(0.96);
        }
        body.dark .api-btn {
            background: var(--api-btn-dark);
            color: var(--api-btn-text-dark);
        }
        hr.api-divider {
            width: 100%;
            max-width: 340px;
            border: none;
            height: 2px;
            background: var(--divider-light);
            margin: 24px auto;
            border-radius: 2px;
        }
        body.dark hr.api-divider {
            background: var(--divider-dark);
        }
        /* Responsive */
        @media (max-width: 600px) {
            .center-title img {
                width: 38px;
                height: 38px;
            }
            .api-section {
                max-width: 98vw;
            }
            .apis-list {
                gap: 18px;
            }
            .api-item {
                max-width: 94vw;
            }
            .api-btn {
                padding: 8px 18px;
                font-size: 1rem;
            }
            .api-sheet-img {
                width: 28px;
                height: 28px;
            }
        }
        /* Click effect */
        .click-effect {
            position: fixed;
            pointer-events: none;
            z-index: 10000;
            width: 44px;
            height: 44px;
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
            animation: pop-fade 0.5s forwards;
            will-change: transform, opacity, filter;
            filter: drop-shadow(0 2px 10px #0002);
            transition: filter 0.3s;
        }
        body.dark .click-effect {
            filter: drop-shadow(0 2px 10px #fff3);
        }
        @keyframes pop-fade {
            0% {
                transform: translate(-50%, -50%) scale(0.6);
                opacity: 0.85;
            }
            50% {
                transform: translate(-50%, -50%) scale(1.18) rotate(-10deg);
                opacity: 1;
            }
            100% {
                transform: translate(-50%, -50%) scale(0.6) rotate(10deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <button class="toggle-btn" id="toggleTheme">Claro 🌞</button>
    <button class="menu-btn" id="menuBtn" aria-label="Menú">&#8942;</button>
    <div class="menu-dropdown" id="menuDropdown">
        <a href="index.html">Inicio</a>
        <a href="github.html" target="_blank">GitHub</a>
        <a href="contact.html">Contacto</a>
    </div>
    <div class="center-title">
        <img src="./images/logo.png" alt="Logo">
        <h1>Nyxian.xyz</h1>
    </div>
    <div class="api-section">
        <div class="api-title">APIS CREADAS POR IANALEJANDROOK14X</div>
        <div class="apis-list">
            <div class="api-item">
                <img class="api-sheet-img" src="./images/api/sheet.png" alt="Sheet Icon">
                <div class="api-name">ChatGPT</div>
                <a href="./APIS/chatgpt.js" target="_blank">
                    <button class="api-btn">Ver</button>
                </a>
            </div>
            <hr class="api-divider">
            <div class="api-item">
                <img class="api-sheet-img" src="./images/api/sheet.png" alt="Sheet Icon">
                <div class="api-name">TiktokSearch</div>
                <a href="./APIS/tiktoksearch.js" target="_blank">
                    <button class="api-btn">Ver</button>
                </a>
            </div>
        </div>
    </div>
    <script>
        const btn = document.getElementById('toggleTheme');
        const body = document.body;
        let darkMode = localStorage.getItem('darkMode') === 'true';

        function applyTheme() {
            if (darkMode) {
                body.classList.add('dark');
                btn.textContent = 'Oscuro 🌙';
            } else {
                body.classList.remove('dark');
                btn.textContent = 'Claro 🌞';
            }
        }

        applyTheme();

        btn.addEventListener('click', () => {
            darkMode = !darkMode;
            localStorage.setItem('darkMode', darkMode);
            applyTheme();
        });

        // Menú desplegable hamburguesa
        const menuBtn = document.getElementById('menuBtn');
        const menuDropdown = document.getElementById('menuDropdown');
        menuBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            menuDropdown.classList.toggle('show');
        });
        document.addEventListener('click', () => {
            menuDropdown.classList.remove('show');
        });
        menuDropdown.addEventListener('click', (e) => {
            e.stopPropagation();
        });

        // EFECTO DE ICONO EN CLICK
        document.addEventListener('click', function (e) {
            if (e.target.closest('.menu-dropdown') || e.target.closest('.menu-btn')) return;
            if (e.target.closest('.toggle-btn')) return;

            const effect = document.createElement('img');
            effect.src = './images/icon-web.png';
            effect.className = 'click-effect';
            effect.style.left = e.clientX + 'px';
            effect.style.top = e.clientY + 'px';

            if (body.classList.contains('dark')) {
                effect.style.filter += ' invert(1)';
            } else {
                effect.style.filter = effect.style.filter.replace('invert(1)', '');
            }

            document.body.appendChild(effect);
            setTimeout(() => {
                effect.remove();
            }, 500);
        });
    </script>
</body>
</html>
