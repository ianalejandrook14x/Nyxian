<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nyxian</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Montserrat:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6d5bff;
            --accent: #ad9bff;
            --bg-dark: #181A20;
            --bg-overlay: rgba(41, 35, 51, 0.68);
            --card-bg: #23253aee;
            --text-main: #fff;
            --text-secondary: #c3c3c3;
            --shadow: 0 8px 32px 0 #6d5bff44;
        }
        html, body {
            min-height: 100%;
        }
        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(120deg, #23253a 0%, #6d5bff 100%);
            color: var(--text-main);
            font-family: 'Montserrat', Arial, sans-serif;
            font-weight: 700;
            position: relative;
            overflow-x: hidden;
        }
        .overlay-bg {
            position: fixed;
            inset: 0;
            background: var(--bg-overlay);
            z-index: 1;
            pointer-events: none;
            animation: overlayFadeIn 1.5s cubic-bezier(.4,1.1,.68,1);
        }
        @keyframes overlayFadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .bg-glow {
            position: fixed;
            top: -120px;
            left: 50%;
            width: 720px;
            height: 350px;
            background: radial-gradient(circle, #ad9bff55 0%, #6d5bff11 80%);
            filter: blur(49px);
            opacity: 0.82;
            pointer-events: none;
            z-index: 2;
            transform: translateX(-50%);
            animation: pulseGlow 7s infinite alternate cubic-bezier(.65,.01,.32,1);
        }
        @keyframes pulseGlow {
            0% { opacity: 0.70; }
            100% { opacity: 0.92; }
        }
        .particle {
            position: fixed;
            pointer-events: none;
            z-index: 2;
            border-radius: 50%;
            opacity: 0.13;
            animation: floatParticle 14s linear infinite;
        }
        @keyframes floatParticle {
            0% { transform: translateY(0) scale(1);}
            80% { opacity: 0.23;}
            100% { transform: translateY(-95vh) scale(1.13); opacity: 0;}
        }
        .header {
            position: relative;
            z-index: 10;
            margin-top: 70px;
            text-align: center;
        }
        .nyxian-logo {
            width: 58px;
            height: 58px;
            border-radius: 50%;
            box-shadow: 0 6px 30px #ad9bff55;
            margin-bottom: 16px;
            object-fit: cover;
            background: #fff;
        }
        .title {
            font-family: 'Archivo Black', Arial, sans-serif;
            font-size: 3rem;
            letter-spacing: 3px;
            color: #fff;
            text-shadow: 0 2px 20px #6D5BFF80, 0 1px 2px #000a;
            margin-bottom: 8px;
        }
        .subtitle {
            font-weight: 700;
            color: var(--accent);
            font-size: 1.27rem;
            letter-spacing: 1.5px;
            margin-bottom: 28px;
        }
        .card {
            background: var(--card-bg);
            border-radius: 22px;
            box-shadow: var(--shadow);
            padding: 40px 36px 32px 36px;
            max-width: 440px;
            width: 95vw;
            margin: 0 auto 54px auto;
            position: relative;
            z-index: 10;
            animation: fadeInUp 1.1s cubic-bezier(.18,.89,.32,1.28);
        }
        @keyframes fadeInUp {
            0% { opacity: 0; transform: translateY(56px);}
            100% { opacity: 1; transform: translateY(0);}
        }
        .card h2 {
            font-family: 'Archivo Black', Arial, sans-serif;
            color: var(--primary);
            font-size: 1.38rem;
            margin: 0 0 12px 0;
            letter-spacing: 2px;
        }
        .card p {
            margin: 0 0 18px 0;
            color: var(--text-secondary);
            font-size: 1.13rem;
            line-height: 1.68;
            font-weight: 700;
        }
        .nyxian-btn {
            padding: 13px 38px;
            border: none;
            border-radius: 13px;
            background: linear-gradient(90deg, #6D5BFF 0%, #AD9BFF 100%);
            color: #fff;
            font-family: 'Archivo Black', Arial, sans-serif;
            font-size: 1.13rem;
            letter-spacing: 1.3px;
            box-shadow: 0 6px 20px 0 #6D5BFF44;
            cursor: pointer;
            font-weight: 400;
            margin-top: 14px;
            margin-bottom: 2px;
            transition: transform 0.13s, box-shadow 0.18s, background 0.2s;
        }
        .nyxian-btn:hover {
            transform: translateY(-2px) scale(1.06);
            background: linear-gradient(90deg, #AD9BFF 0%, #6D5BFF 100%);
            box-shadow: 0 10px 32px 0 #6D5BFF77;
        }
        .divider {
            width: 80vw;
            max-width: 320px;
            border: none;
            height: 2.5px;
            background: linear-gradient(90deg,#ad9bff 0,#6d5bff 100%);
            margin: 35px auto 30px auto;
            border-radius: 2px;
            opacity: 0.8;
        }
        .nyxian-footer {
            width: 100vw;
            text-align: center;
            color: #c3c3c3;
            font-size: 1rem;
            font-family: 'Montserrat', Arial, sans-serif;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 18px;
            margin-top: 16px;
            z-index: 10;
            position: relative;
        }
        /* Responsive */
        @media (max-width: 700px) {
            .card { padding: 22px 7vw 22px 7vw; }
            .title { font-size: 2.1rem; }
            .subtitle { font-size: 1.12rem;}
        }
        @media (max-width: 440px) {
            .title { font-size: 1.35rem;}
            .card { padding: 8vw 2vw;}
        }
    </style>
</head>
<body>
    <div class="overlay-bg"></div>
    <div class="bg-glow"></div>
    <div class="header">
        <img class="nyxian-logo" src="images/logo.png" alt="Logo Nyxian" onerror="this.style.background='#eee';this.style.boxShadow='none';this.src='https://qu.ax/dZhkJ.png'">
        <div class="title">Nyxian.xyz</div>
        <div class="subtitle">Bienvenido disfruta de tu estadia.</div>
    </div>
    <div class="card">
        <h2>Información</h2>
        <p>
            Template por ianalejandrook14x.<br>
            <br>
            Nyxian 2024 - 2025.
            <br>
            <br>
        </p>
        <a class="nyxian-btn" href="https://github.com/ianalejandrook14x" target="_blank">GitHub</a>
    </div>
    <div class="divider"></div>
    <div class="nyxian-footer">
        © 2025 Nyxian. Todos los derechos reservados.<br>
        Creado por ianalejandrook14x
    </div>
    <script>
        function randomParticle() {
            const p = document.createElement('div');
            p.className = 'particle';
            const size = Math.random() * 24 + 12;
            p.style.width = p.style.height = size + 'px';
            p.style.left = Math.random() * 99 + 'vw';
            p.style.bottom = '-50px';
            p.style.background = `radial-gradient(circle, #fff 0%, #6d5bff 80%, #181A20 100%)`;
            p.style.opacity = Math.random() * 0.21 + 0.12;
            p.style.animationDuration = (10 + Math.random() * 7) + 's';
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 16000);
        }
        setInterval(randomParticle, 900);
        for(let i=0; i<10; i++) setTimeout(randomParticle, 120 + i*230);
    </script>
</body>
</html>
