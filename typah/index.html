<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ruby Ixn. Tz</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #000;
            color: #fff;
            height: 100vh;
            font-family: 'Montserrat', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        h1.greeting {
            font-size: 2.5rem;
            margin-bottom: 24px;
            letter-spacing: 2px;
        }
        .info-btn {
            padding: 16px 42px;
            font-size: 1.25rem;
            font-weight: 700;
            border: none;
            border-radius: 14px;
            background: #fff;
            color: #000;
            cursor: pointer;
            transition: background 0.3s, color 0.3s, transform 0.2s;
            z-index: 1;
        }
        .info-btn:hover {
            background: #ddd;
            transform: scale(1.03);
        }
        .info-btn:active {
            transform: scale(0.97);
        }

        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(3px);
            -webkit-backdrop-filter: blur(3px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2;
            transition: opacity 0.3s ease;
        }

        .overlay.active {
            display: flex;
        }

        .overlay-content {
            position: relative;
            background: #111;
            color: #fff;
            padding: 40px 52px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
            max-width: 90vw;
            text-align: center;
            z-index: 3;
        }

        .close-btn {
            position: absolute;
            top: 12px;
            right: 16px;
            background: none;
            border: none;
            font-size: 1.8rem;
            color: #888;
            cursor: pointer;
        }
        .close-btn:hover {
            color: #ff6a00;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #fff;
            border-radius: 50%;
            opacity: 0.8;
            pointer-events: none;
            animation: fall linear infinite;
            z-index: 0;
        }

        @keyframes fall {
            from {
                transform: translateY(-10vh);
                opacity: 1;
            }
            to {
                transform: translateY(110vh);
                opacity: 0;
            }
        }

        .leaf {
            position: absolute;
            font-size: 1.5rem;
            animation: leafFall 3s ease-in forwards;
            pointer-events: none;
            z-index: 4;
        }

        @keyframes leafFall {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <h1 class="greeting">Para ustedes</h1>
    <button class="info-btn" id="infoBtn">Información</button>

    <div class="overlay" id="overlay">
        <div class="overlay-content">
            <button class="close-btn" id="closeBtn" aria-label="Cerrar">×</button>
            <p>Dejen las adicciones que estas no las lleva a ningún lado.</p>
        </div>
    </div>

    <script>
        const infoBtn = document.getElementById('infoBtn');
        const overlay = document.getElementById('overlay');
        const closeBtn = document.getElementById('closeBtn');

        infoBtn.addEventListener('click', () => {
            overlay.classList.add('active');
            dropLeaves();
        });

        closeBtn.addEventListener('click', () => overlay.classList.remove('active'));

        overlay.addEventListener('click', e => {
            if (e.target === overlay) overlay.classList.remove('active');
        });

        // Estrellas
        const numStars = 120;
        for (let i = 0; i < numStars; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 2 + 1;
            star.style.width = `${size}px`;
            star.style.height = `${size}px`;
            star.style.left = `${Math.random() * 100}vw`;
            star.style.top = `-${Math.random() * 100}vh`;
            const duration = 4 + Math.random() * 6;
            star.style.animationDuration = `${duration}s`;
            star.style.animationDelay = `${Math.random() * duration}s`;
            document.body.appendChild(star);
        }
        
    </script>
</body>
</html>
