<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nyxian Carrusel Tarjeta (Rectángulo Abajo)</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background: #15161a;
            color: #fff;
            font-family: 'Montserrat', Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card-carousel-container {
            position: relative;
            width: 320px;
            height: 440px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(30,32,36,0.95);
            border-radius: 24px;
            box-shadow: 0 8px 32px #0004;
            overflow: hidden;
        }
        .card-image {
            width: 100%;
            height: 320px;
            object-fit: cover;
            border-radius: 18px;
            box-shadow: 0 4px 24px #0008;
            transition: opacity 0.7s, transform 0.7s;
            opacity: 0;
            position: absolute;
            left: 0;
            top: 30px;
            z-index: 1;
            transform: scale(1);
        }
        .card-image.active {
            opacity: 1;
            z-index: 5;
            transform: scale(1.05);
        }
        .card-name {
            position: absolute;
            bottom: 125px;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 1.35rem;
            font-weight: 700;
            color: #fff;
            background: rgba(0,0,0,0.43);
            padding: 10px 0;
            letter-spacing: 1px;
            border-radius: 0 0 20px 20px;
            z-index: 10;
            transition: opacity 0.7s;
            opacity: 0;
        }
        .card-name.active {
            opacity: 1;
        }
        .card-bottom-bar {
            position: absolute;
            left: 0;
            bottom: 0;
            width: 100%;
            height: 70px;
            background: #2c2e32;
            border-radius: 0 0 24px 24px;
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        @media (max-width: 480px) {
            .card-carousel-container {
                width: 98vw;
                height: 70vw;
                min-width: 0;
                min-height: 0;
                max-width: 380px;
                max-height: 520px;
            }
            .card-image {
                height: 62vw;
                min-height: 180px;
                max-height: 340px;
            }
            .card-bottom-bar {
                height: 50px;
            }
            .card-name {
                font-size: 1.05rem;
                bottom: 90px;
            }
        }
    </style>
</head>
<body>
    <div class="card-carousel-container">
        <!-- Images -->
        <img src="./images/imagen-1.jpg" alt="Akeno Himejima" class="card-image">
        <img src="./images/imagen-2.jpg" alt="Marin Kitagawa" class="card-image">
        <img src="./images/imagen-3.jpg" alt="Tsukasa Yuzaki" class="card-image">
        <img src="./images/imagen-4.jpg" alt="Nino Nakano" class="card-image">

        <!-- Nombre encima -->
        <div class="card-name"></div>
        <!-- Rectángulo gris abajo -->
        <div class="card-bottom-bar"></div>
    </div>
    <script>
        // Configuración de imágenes y nombres
        const cards = [
            {src: './images/imagen-1.jpg', name: "Akeno Himejima"},
            {src: './images/imagen-2.jpg', name: "Marin Kitagawa"},
            {src: './images/imagen-3.jpg', name: "Tsukasa Yuzaki"},
            {src: './images/imagen-4.jpg', name: "Nino Nakano"},
        ];

        const images = document.querySelectorAll('.card-image');
        const nameDiv = document.querySelector('.card-name');
        let current = 0;
        let autoInterval = null;

        function showCard(idx) {
            images.forEach((img, i) => {
                img.classList.toggle('active', i === idx);
            });
            nameDiv.textContent = cards[idx].name;
            nameDiv.classList.add('active');
        }

        function nextCard() {
            current = (current+1) % cards.length;
            showCard(current);
        }

        // Inicializar imágenes y nombres
        images.forEach((img, i) => {
            img.src = cards[i].src;
            img.alt = cards[i].name;
        });

        showCard(current);
        autoInterval = setInterval(nextCard, 3000);

        // Opcional: pausar auto-cambio si el mouse está sobre la tarjeta
        document.querySelector('.card-carousel-container').addEventListener('mouseenter', () => {
            clearInterval(autoInterval);
        });
        document.querySelector('.card-carousel-container').addEventListener('mouseleave', () => {
            autoInterval = setInterval(nextCard, 3000);
        });
    </script>
</body>
</html>
