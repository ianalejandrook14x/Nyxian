<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Valentina</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    /* Fondo animado con gradiente y partículas */
    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      overflow: hidden;
      background: linear-gradient(120deg, #ffb6c1 0%, #ffe4e1 100%);
      position: relative;
    }

    /* Canvas para partículas */
    #particles-bg {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      z-index: 0;
      pointer-events: none;
    }

    .container {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    h1 {
      font-size: 4rem;
      margin: 0 0 2rem 0;
      color: #db2777;
      text-shadow: 0 2px 16px #fff8, 0 6px 30px #db277766;
      animation: popIn 1s cubic-bezier(.29,1.64,.58,.98);
      letter-spacing: 0.1em;
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.8);}
      to { opacity: 1; transform: scale(1);}
    }

    .info-btn {
      font-size: 1.2rem;
      color: white;
      background: linear-gradient(90deg, #f472b6 30%, #f9a8d4 100%);
      border: none;
      border-radius: 2rem;
      padding: 1rem 2.5rem;
      cursor: pointer;
      box-shadow: 0 2px 12px #db277755;
      transition: transform 0.15s, background 0.5s;
      margin-top: 1rem;
    }
    .info-btn:hover {
      transform: scale(1.07);
      background: linear-gradient(90deg, #f472b6 0%, #db2777 100%);
    }

    .modal-bg {
      display: none;
      position: fixed;
      left: 0; top: 0;
      width: 100vw; height: 100vh;
      background: rgba(255, 182, 193, 0.75);
      z-index: 10;
      align-items: center;
      justify-content: center;
    }

    .modal-bg.active {
      display: flex;
      animation: fadeIn 0.5s;
    }

    @keyframes fadeIn {
      from { opacity: 0;}
      to { opacity: 1;}
    }

    .modal-content {
      background: #fff;
      border-radius: 2rem;
      box-shadow: 0 8px 32px #db277777;
      padding: 2.5rem 3rem;
      text-align: center;
      position: relative;
      min-width: 300px;
      max-width: 90vw;
      animation: modalPop 0.5s cubic-bezier(.29,1.64,.58,.98);
    }

    @keyframes modalPop {
      from { opacity: 0; transform: translateY(40px) scale(0.8);}
      to { opacity: 1; transform: translateY(0) scale(1);}
    }

    .close-btn {
      position: absolute;
      top: 1.2rem;
      right: 1.7rem;
      font-size: 2rem;
      color: #f472b6;
      background: none;
      border: none;
      cursor: pointer;
      transition: color 0.3s;
    }
    .close-btn:hover {
      color: #db2777;
    }

    .confession-text {
      font-size: 2rem;
      font-weight: bold;
      color: #db2777;
      text-shadow: 0 2px 12px #f9a8d477;
      margin-top: 1rem;
      letter-spacing: 0.05em;
      /* Animación de texto */
      animation: rainbow 2s linear infinite, fadeInConfess 1.2s;
      background: linear-gradient(90deg, #f472b6, #db2777, #f9a8d4, #f472b6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    @keyframes rainbow {
      0% {background-position: 0%;}
      100% {background-position: 100%;}
    }
    @keyframes fadeInConfess {
      from {opacity: 0; transform: scale(1.15);}
      to {opacity: 1; transform: scale(1);}
    }

    @media (max-width: 500px) {
      h1 { font-size: 2.2rem;}
      .modal-content { padding: 1.2rem 0.5rem;}
      .confession-text { font-size: 1.2rem;}
      .info-btn { padding: 0.8rem 1.2rem;}
    }
  </style>
</head>
<body>
  <canvas id="particles-bg"></canvas>
  <div class="container">
    <h1>Valentina</h1>
    <button class="info-btn" id="infoBtn">Información</button>
  </div>
  <div class="modal-bg" id="modalBg">
    <div class="modal-content">
      <button class="close-btn" id="closeBtn" title="Cerrar">&times;</button>
      <div class="confession-text" id="confessionText">
        Valentina yo te quiero
      </div>
    </div>
  </div>
  <script>
    // Modal logic
    const infoBtn = document.getElementById('infoBtn');
    const modalBg = document.getElementById('modalBg');
    const closeBtn = document.getElementById('closeBtn');
    infoBtn.onclick = () => modalBg.classList.add('active');
    closeBtn.onclick = () => modalBg.classList.remove('active');
    modalBg.onclick = (e) => { if (e.target === modalBg) modalBg.classList.remove('active'); };

    // Partículas corazones animados en el fondo
    const canvas = document.getElementById('particles-bg');
    const ctx = canvas.getContext('2d');
    let W = window.innerWidth, H = window.innerHeight;
    function resizeCanvas() {
      W = window.innerWidth;
      H = window.innerHeight;
      canvas.width = W;
      canvas.height = H;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    function randomBetween(a,b) {
      return a + Math.random()*(b-a);
    }
    // Partículas corazones
    const hearts = [];
    const colors = ['#db2777','#f472b6','#f9a8d4','#fff','#fb7185'];
    for(let i=0;i<28;i++){
      hearts.push({
        x: randomBetween(0, W),
        y: randomBetween(0, H),
        size: randomBetween(16,32),
        color: colors[Math.floor(Math.random()*colors.length)],
        speed: randomBetween(0.4,1.3),
        dx: randomBetween(-0.3,0.3),
        phase: Math.random()*Math.PI*2
      });
    }
    function drawHeart(x, y, s, color, phase) {
      ctx.save();
      ctx.translate(x, y+Math.sin(performance.now()/700 + phase)*4);
      ctx.rotate(Math.sin(performance.now()/500 + phase)*0.04);
      ctx.scale(s/25, s/25);
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.bezierCurveTo(0, -8, -12, -12, -12, 0);
      ctx.bezierCurveTo(-12, 10, 0, 14, 0, 22);
      ctx.bezierCurveTo(0, 14, 12, 10, 12, 0);
      ctx.bezierCurveTo(12, -12, 0, -8, 0, 0);
      ctx.closePath();
      ctx.fillStyle = color;
      ctx.globalAlpha = 0.65;
      ctx.shadowColor = color;
      ctx.shadowBlur = 8;
      ctx.fill();
      ctx.globalAlpha = 1;
      ctx.restore();
    }
    function animate() {
      ctx.clearRect(0,0,W,H);
      for(let h of hearts) {
        drawHeart(h.x, h.y, h.size, h.color, h.phase);
        h.y -= h.speed;
        h.x += h.dx;
        if(h.y < -30 || h.x < -30 || h.x > W+30){
          h.x = randomBetween(0,W);
          h.y = H+randomBetween(10,80);
          h.size = randomBetween(16,32);
          h.color = colors[Math.floor(Math.random()*colors.length)];
          h.speed = randomBetween(0.4,1.3);
          h.dx = randomBetween(-0.3,0.3);
          h.phase = Math.random()*Math.PI*2;
        }
      }
      requestAnimationFrame(animate);
    }
    animate();
  </script>
</body>
</html>
