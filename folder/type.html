<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Valentina</title>
  <style>
    html, body {
      margin: 0; padding: 0;
      height: 100%; width: 100%;
      overflow: hidden;
      background: linear-gradient(120deg, #ffb6c1 0%, #ffe4e1 100%);
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    canvas#heartCanvas {
      position: absolute;
      top: 0; left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 1;
    }
    #bigHeartBtn {
      position: relative;
      z-index: 5;
      background: none;
      border: none;
      display: none;
    }
    .big-heart-svg {
      width: 100px;
      height: 100px;
      fill: #db2777;
      stroke: #f9a8d4;
      stroke-width: 3;
    }
    #touchText {
      margin-top: 20px;
      font-size: 1.5rem;
      color: #db2777;
      opacity: 0;
      transition: opacity 0.5s ease;
      z-index: 5;
    }
    #touchText.show {
      opacity: 1;
    }
  </style>
</head>
<body>

<canvas id="heartCanvas"></canvas>

<button id="bigHeartBtn">
  <svg class="big-heart-svg" viewBox="0 0 60 60">
    <path d="M30 54S5 37 5 21c0-7.5 6-13 13-13 5.2 0 10 3.5 12 8 2-4.5 6.8-8 12-8 7 0 13 5.5 13 13C55 37 30 54 30 54Z"/>
  </svg>
</button>

<div id="touchText">Toca el corazón</div>

<script>
  const canvas = document.getElementById('heartCanvas');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  function heartShape(t) {
    return {
      x: 16 * Math.pow(Math.sin(t), 3),
      y: 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t)
    };
  }

  const W = canvas.width;
  const H = canvas.height;

  const heartPoints = [];
  const N = 300;
  for (let i = 0; i < N; i++) {
    const t = Math.PI * 2 * (i / N);
    const p = heartShape(t);
    heartPoints.push({
      x: W / 2 + p.x * 15,
      y: H / 2 - p.y * 15
    });
  }

  class Particle {
    constructor(destX, destY) {
      this.x = Math.random() * W;
      this.y = Math.random() * H;
      this.destX = destX;
      this.destY = destY;
      this.vx = 0;
      this.vy = 0;
      this.acc = 0.07 + Math.random() * 0.03;
      this.size = 2 + Math.random();
    }
    update() {
      const dx = this.destX - this.x;
      const dy = this.destY - this.y;
      this.vx += dx * this.acc;
      this.vy += dy * this.acc;
      this.vx *= 0.8;
      this.vy *= 0.8;
      this.x += this.vx;
      this.y += this.vy;
    }
    draw(ctx) {
      ctx.beginPath();
      ctx.fillStyle = '#db2777';
      ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
      ctx.fill();
    }
    isClose() {
      return Math.hypot(this.destX - this.x, this.destY - this.y) < 2;
    }
  }

  const particles = heartPoints.map(p => new Particle(p.x, p.y));
  const bigHeartBtn = document.getElementById('bigHeartBtn');
  const touchText = document.getElementById('touchText');

  let assembled = false;
  function animate() {
    ctx.clearRect(0, 0, W, H);
    let allClose = true;
    for (let p of particles) {
      p.update();
      p.draw(ctx);
      if (!p.isClose()) allClose = false;
    }
    if (!assembled && allClose) {
      assembled = true;
      setTimeout(() => {
        bigHeartBtn.style.display = 'block';
        touchText.classList.add('show');
      }, 300);
    }
    if (!assembled) requestAnimationFrame(animate);
  }
  animate();
</script>
</body>
</html>
